services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: orders
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  catalog:
    build:
      context: ./src/catalog
    environment:
      GIN_MODE: release
      RETAIL_CATALOG_PERSISTENCE_PROVIDER: postgres
      RETAIL_CATALOG_PERSISTENCE_ENDPOINT: db:5432
      RETAIL_CATALOG_PERSISTENCE_DB_NAME: catalogdb
      RETAIL_CATALOG_PERSISTENCE_USER: ${DB_USER}
      RETAIL_CATALOG_PERSISTENCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db

  carts:
    build:
      context: ./src/cart
    environment:
      CART_PERSISTENCE_PROVIDER: postgres
      CART_POSTGRES_HOST: db
      CART_POSTGRES_PORT: "5432"
      CART_POSTGRES_DB: cartdb
      CART_POSTGRES_USER: ${DB_USER}
      CART_POSTGRES_PASSWORD: ${DB_PASSWORD}
      PORT: "8080"
    depends_on:
      - db

  orders:
    build:
      context: ./src/orders
    environment:
      GIN_MODE: release
      RETAIL_ORDERS_PERSISTENCE_ENDPOINT: db:5432
      RETAIL_ORDERS_PERSISTENCE_NAME: orders
      RETAIL_ORDERS_PERSISTENCE_USERNAME: ${DB_USER}
      RETAIL_ORDERS_PERSISTENCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db

  checkout:
    build:
      context: ./src/checkout
    environment:
      RETAIL_CHECKOUT_PERSISTENCE_PROVIDER: redis
      RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL: redis://redis:6379
      RETAIL_CHECKOUT_ENDPOINTS_ORDERS: http://orders:8080
    depends_on:
      - redis
      - orders

  ui:
    build:
      context: ./src/ui
    environment:
      RETAIL_UI_ENDPOINTS_CATALOG:  http://catalog:8080
      RETAIL_UI_ENDPOINTS_CARTS:    http://carts:8080
      RETAIL_UI_ENDPOINTS_CHECKOUT: http://checkout:8080
      RETAIL_UI_ENDPOINTS_ORDERS:   http://orders:8080
    ports:
      - "8080:8080"
    depends_on:
      - catalog
      - carts
      - orders
      - checkout

  admin:
    build:
      context: ./src/admin
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  db-data:
