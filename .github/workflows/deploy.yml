name: Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

env:
  ENVIRONMENT: "${{ github.event.inputs.environment || 'dev' }}"

jobs:
  # ─────────────────────────────────────────────
  # 1. DETECCIÓN DE SECRETOS
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: security/.gitleaks.toml

  # ─────────────────────────────────────────────
  # 2. SAST - ANÁLISIS ESTÁTICO DE CÓDIGO
  # ─────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep - Go (catalog, orders)
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/golang
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep - Python (cart)
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/python
            p/bandit
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep - TypeScript (checkout, ui, admin)
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/typescript
            p/nodejs
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          token: ${{ secrets.DEVOPS_TOKEN }}

  # ─────────────────────────────────────────────
  # 3. SCA - ANÁLISIS DE DEPENDENCIAS
  
  # ─────────────────────────────────────────────
  sca:
    name: SCA - Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - Scan filesystem (dependencias)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: security/.trivyignore
          format: sarif
          output: trivy-fs.sarif

      - name: Check SARIF file
        if: always()
        run: |
          if [ -f trivy-fs.sarif ]; then
            echo "✓ trivy-fs.sarif encontrado"
            ls -lh trivy-fs.sarif
          else
            echo "✗ trivy-fs.sarif NO encontrado"
          fi

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
          token: ${{ secrets.DEVOPS_TOKEN }}

  # ─────────────────────────────────────────────
  # 4. BUILD DE IMÁGENES
  # ─────────────────────────────────────────────
  build:
    name: Build & Scan Images
    runs-on: ubuntu-latest
    needs: [sast, sca]
    permissions:
      contents: read
    strategy:
      matrix:
        service: [catalog, cart, checkout, orders, ui, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.ENVIRONMENT }}-${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/retailstore-${{ matrix.service }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/retailstore-${{ matrix.service }}:latest \
            src/${{ matrix.service }}/

      - name: Trivy - Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/retailstore-${{ matrix.service }}:${{ env.ENVIRONMENT }}-${{ github.sha }}"
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: security/.trivyignore

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.ENVIRONMENT }}-${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/retailstore-${{ matrix.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/retailstore-${{ matrix.service }}:latest

  # ─────────────────────────────────────────────
  # 5. DEPLOY CON TERRAFORM
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: build
    environment: "${{ github.event.inputs.environment || 'dev' }}"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Terraform Plan
        working-directory: infrastructure/environments/${{ env.ENVIRONMENT }}
        run: terraform plan -var-file="${{ env.ENVIRONMENT }}.tfvars" -out=tfplan

      - name: Manual Approval (solo prod)
        if: env.ENVIRONMENT == 'prod'
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ vars.PROD_APPROVERS }}
          minimum-approvals: 1

      - name: Terraform Apply
        working-directory: infrastructure/environments/${{ env.ENVIRONMENT }}
        run: terraform apply -auto-approve tfplan

      - name: Get ALB URL from Terraform output
        id: tf-output
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT

      - name: Wait for services to be ready
        run: |
          bash tests/wait-for-services.sh "${{ steps.tf-output.outputs.alb_url }}" 120

      - name: Smoke Tests
        run: |
          bash tests/smoke-tests.sh "${{ steps.tf-output.outputs.alb_url }}"
