name: App Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'security/**'
      - 'tests/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  # ─────────────────────────────────────────────
  # 1. DETECCIÓN DE SECRETOS
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: security/.gitleaks.toml

  # ─────────────────────────────────────────────
  # 2. SAST - ANÁLISIS ESTÁTICO DE CÓDIGO
  # ─────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep - Go (catalog, orders)
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/golang
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep - Python (cart)
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/python
            p/bandit
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep - TypeScript (checkout, ui, admin)
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/typescript
            p/nodejs
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Mostrar resumen Semgrep
        if: always()
        run: |
          echo "## Resultados SAST (Semgrep)" >> $GITHUB_STEP_SUMMARY
          if [ -f semgrep.sarif ]; then
            FINDINGS=$(python3 -c "import json,sys; d=json.load(open('semgrep.sarif')); print(sum(len(r.get('results',[])) for r in d.get('runs',[])))" 2>/dev/null || echo "?")
            echo "Hallazgos encontrados: **$FINDINGS**" >> $GITHUB_STEP_SUMMARY
          else
            echo "Archivo SARIF no generado" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # 3. SCA - ANÁLISIS DE DEPENDENCIAS
  # ─────────────────────────────────────────────
  sca:
    name: SCA - Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - Scan filesystem (dependencias)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: security/.trivyignore
          format: sarif
          output: trivy-fs.sarif

      - name: Mostrar resumen Trivy
        if: always()
        run: |
          echo "## Resultados SCA (Trivy)" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-fs.sarif ]; then
            FINDINGS=$(python3 -c "import json,sys; d=json.load(open('trivy-fs.sarif')); print(sum(len(r.get('results',[])) for r in d.get('runs',[])))" 2>/dev/null || echo "?")
            echo "Vulnerabilidades CRITICAL/HIGH encontradas: **$FINDINGS**" >> $GITHUB_STEP_SUMMARY
          else
            echo "Sin vulnerabilidades CRITICAL/HIGH detectadas ✅" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # 4. BOOTSTRAP ECR (CREAR REPOSITORIOS)
  # ─────────────────────────────────────────────
  bootstrap-ecr:
    name: Bootstrap ECR Repositories
    runs-on: ubuntu-latest
    needs: [sast, sca]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init (ECR module, con backend S3)
        working-directory: infrastructure/modules/ecr
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform init \
            -backend-config="bucket=retailstore-${ENV}-terraform-state" \
            -reconfigure

      - name: Terraform Plan (ECR)
        working-directory: infrastructure/modules/ecr
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_services: '["catalog", "cart", "checkout", "orders", "ui", "admin"]'
        run: terraform plan -out=ecr.tfplan

      - name: Terraform Apply (ECR)
        working-directory: infrastructure/modules/ecr
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_services: '["catalog", "cart", "checkout", "orders", "ui", "admin"]'
        run: terraform apply -auto-approve ecr.tfplan

  # ─────────────────────────────────────────────
  # 5. BUILD DE IMÁGENES
  # ─────────────────────────────────────────────
  build:
    name: Build & Scan Images
    runs-on: ubuntu-latest
    needs: bootstrap-ecr
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: read
    strategy:
      matrix:
        service: [catalog, cart, checkout, orders, ui, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: src/${{ matrix.service }}/Dockerfile
          failure-threshold: warning

      - name: Build image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/retailstore-${{ github.event.inputs.environment || 'dev' }}-${{ matrix.service }}:$IMAGE_TAG \
            src/${{ matrix.service }}/

      - name: Trivy - Scan image for CRITICAL (bloqueante)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/retailstore-${{ github.event.inputs.environment || 'dev' }}-${{ matrix.service }}:${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}"
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: security/.trivyignore

      - name: Trivy - Scan image for HIGH (informativo)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/retailstore-${{ github.event.inputs.environment || 'dev' }}-${{ matrix.service }}:${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}"
          severity: HIGH
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: security/.trivyignore

      - name: Validate image metadata (USER, SIZE)
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/retailstore-${{ github.event.inputs.environment || 'dev' }}-${{ matrix.service }}:${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}
        run: |
          # Validar que la imagen no corre como root
          USER=$(docker inspect "${{ env.IMAGE }}" --format='{{.Config.User}}')
          if [ -z "$USER" ] || [ "$USER" = "root" ] || [ "$USER" = "0" ]; then
            echo "❌ ERROR: Imagen corre como root. USER definido: '$USER'"
            exit 1
          fi
          echo "✅ Usuario de imagen: $USER"

          # Validar que el tamaño no supere 500MB
          SIZE=$(docker image inspect "${{ env.IMAGE }}" --format='{{.Size}}')
          MAX_SIZE=524288000  # 500MB en bytes
          SIZE_MB=$((SIZE / 1048576))
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "❌ ERROR: Imagen supera 500MB (actual: ${SIZE_MB}MB)"
            exit 1
          fi
          echo "✅ Tamaño de imagen: ${SIZE_MB}MB"

      - name: Scan image layers for secrets with Gitleaks
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/retailstore-${{ github.event.inputs.environment || 'dev' }}-${{ matrix.service }}:${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}
        continue-on-error: true
        run: |
          echo "🔍 Escaneando layers de imagen con Gitleaks..."
          docker save "${{ env.IMAGE }}" | docker run --rm -i zricethezav/gitleaks:latest detect \
            --source /dev/stdin --no-git -f json 2>/dev/null || true
          echo "✅ Scan completado"

      - name: Manual Approval (solo prod)
        if: github.event.inputs.environment == 'prod'
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: Matialv15,MA286704
          minimum-approvals: 1

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/retailstore-${{ github.event.inputs.environment || 'dev' }}-${{ matrix.service }}:$IMAGE_TAG

  # ─────────────────────────────────────────────
  # 6. ACTUALIZAR .tfvars CON EL NUEVO IMAGE_TAG
  # ─────────────────────────────────────────────
  update-tfvars:
    name: Update Terraform tfvars with new image tag
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update tfvars with new image_tag
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
          IMAGE_TAG: ${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}
        run: |
          TFVARS_FILE="infrastructure/environments/${ENV}/${ENV}.tfvars"
          sed -i "s/^image_tag.*$/image_tag          = \"${IMAGE_TAG}\"/" "$TFVARS_FILE"
          cat "$TFVARS_FILE"

      - name: Commit and push updated tfvars
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
          IMAGE_TAG: ${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "infrastructure/environments/${ENV}/${ENV}.tfvars"
          git commit -m "Deploy: Update ${ENV}.tfvars image_tag to ${IMAGE_TAG}" --allow-empty
          git push

      - name: Trigger Infra Pipeline
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
          GH_TOKEN: ${{ secrets.DEVOPS_DISPATCH_TOKEN }}
        run: |
          gh workflow run infra.yml -f environment="${ENV}"
