name: Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

env:
  ENVIRONMENT: "${{ github.event.inputs.environment || 'dev' }}"

jobs:
  # ─────────────────────────────────────────────
  # 1. DETECCIÓN DE SECRETOS ...
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: security/.gitleaks.toml

  # ─────────────────────────────────────────────
  # 2. SAST - ANÁLISIS ESTÁTICO DE CÓDIGO
  # ─────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep - Go (catalog, orders)
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/golang
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep - Python (cart)
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/python
            p/bandit
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep - TypeScript (checkout, ui, admin)
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >
            p/typescript
            p/nodejs
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Mostrar resumen Semgrep
        if: always()
        run: |
          echo "## Resultados SAST (Semgrep)" >> $GITHUB_STEP_SUMMARY
          if [ -f semgrep.sarif ]; then
            FINDINGS=$(python3 -c "import json,sys; d=json.load(open('semgrep.sarif')); print(sum(len(r.get('results',[])) for r in d.get('runs',[])))" 2>/dev/null || echo "?")
            echo "Hallazgos encontrados: **$FINDINGS**" >> $GITHUB_STEP_SUMMARY
          else
            echo "Archivo SARIF no generado" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # 3. SCA - ANÁLISIS DE DEPENDENCIAS
  
  # ─────────────────────────────────────────────
  sca:
    name: SCA - Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - Scan filesystem (dependencias)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: security/.trivyignore
          format: sarif
          output: trivy-fs.sarif

      - name: Mostrar resumen Trivy
        if: always()
        run: |
          echo "## Resultados SCA (Trivy)" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-fs.sarif ]; then
            FINDINGS=$(python3 -c "import json,sys; d=json.load(open('trivy-fs.sarif')); print(sum(len(r.get('results',[])) for r in d.get('runs',[])))" 2>/dev/null || echo "?")
            echo "Vulnerabilidades CRITICAL/HIGH encontradas: **$FINDINGS**" >> $GITHUB_STEP_SUMMARY
          else
            echo "Sin vulnerabilidades CRITICAL/HIGH detectadas ✅" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # 4. BOOTSTRAP ECR (repos deben existir antes del build)
  # ─────────────────────────────────────────────
  ecr-bootstrap:
    name: Bootstrap ECR Repositories
    runs-on: ubuntu-latest
    needs: [sast, sca]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform validate

      - name: Import existing ECR repositories
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          for svc in catalog cart checkout orders ui admin; do
            terraform import \
              -var-file="${ENV}.tfvars" \
              -var="image_tag=${ENV}-${{ github.sha }}" \
              -var="sns_email=${{ secrets.SNS_ALERT_EMAIL }}" \
              "module.ecr.aws_ecr_repository.services[\"${svc}\"]" \
              "retailstore-${svc}" 2>/dev/null || true
          done

      - name: Terraform Plan (ECR)
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform plan \
            -target=module.ecr \
            -var-file="${ENV}.tfvars" \
            -var="image_tag=${ENV}-${{ github.sha }}" \
            -var="sns_email=${{ secrets.SNS_ALERT_EMAIL }}" \
            -out=ecr.tfplan

      - name: Terraform Apply (ECR)
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform apply -auto-approve ecr.tfplan

      - name: Upload Terraform state
        uses: actions/upload-artifact@v4
        with:
          name: tfstate-${{ github.event.inputs.environment || 'dev' }}-${{ github.run_id }}
          path: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}/terraform.tfstate
          retention-days: 1

  # ─────────────────────────────────────────────
  # 5. BUILD DE IMÁGENES
  # ─────────────────────────────────────────────
  build:
    name: Build & Scan Images
    runs-on: ubuntu-latest
    needs: [ecr-bootstrap]
    permissions:
      contents: read
    strategy:
      matrix:
        service: [catalog, cart, checkout, orders, ui, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Tag versionado: <ambiente>-<sha corto> — no se usa latest (buenas prácticas)
          IMAGE_TAG: ${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/retailstore-${{ matrix.service }}:$IMAGE_TAG \
            src/${{ matrix.service }}/

      - name: Trivy - Scan image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/retailstore-${{ matrix.service }}:${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}"
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: security/.trivyignore

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.event.inputs.environment || 'dev' }}-${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/retailstore-${{ matrix.service }}:$IMAGE_TAG

  # ─────────────────────────────────────────────
  # 5. DEPLOY CON TERRAFORM
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: build
    environment: "${{ github.event.inputs.environment || 'dev' }}"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Download Terraform state
        uses: actions/download-artifact@v4
        with:
          name: tfstate-${{ github.event.inputs.environment || 'dev' }}-${{ github.run_id }}
          path: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform init

      - name: Terraform Plan
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform plan \
            -var-file="${ENV}.tfvars" \
            -var="image_tag=${ENV}-${{ github.sha }}" \
            -var="sns_email=${{ secrets.SNS_ALERT_EMAIL }}" \
            -out=tfplan

      - name: Manual Approval (solo prod)
        if: github.event.inputs.environment == 'prod'
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ vars.PROD_APPROVERS }}
          minimum-approvals: 1

      - name: Terraform Apply
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform apply -auto-approve tfplan

      - name: Get ALB URL from Terraform output
        id: tf-output
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT

      - name: Wait for services to be ready
        run: |
          bash tests/wait-for-services.sh "${{ steps.tf-output.outputs.alb_url }}" 120

      - name: Smoke Tests
        run: |
          bash tests/smoke-tests.sh "${{ steps.tf-output.outputs.alb_url }}"

      - name: Upload Terraform state final
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfstate-${{ github.event.inputs.environment || 'dev' }}-final-${{ github.run_id }}
          path: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}/terraform.tfstate
          retention-days: 7
