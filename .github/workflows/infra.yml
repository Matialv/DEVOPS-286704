    environment: "${{ needs.detect-environment.outputs.environment }}"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Download Lambda Package
        uses: actions/download-artifact@v4
        with:
          name: lambda-package-${{ needs.detect-environment.outputs.environment }}
          path: infrastructure/modules/lambda/

      - name: Terraform Apply
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        env:
          ENV: ${{ needs.detect-environment.outputs.environment }}
        run: |
          terraform apply -auto-approve -var-file="${ENV}.tfvars"

      - name: Get Terraform outputs (ALB & RDS endpoint)
        id: tf-output
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          DB_ENDPOINT=$(terraform output -raw db_endpoint 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT
          echo "db_endpoint=$DB_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Update Secrets Manager with RDS endpoint
        env:
          ENV: ${{ needs.detect-environment.outputs.environment }}
          DB_HOST: ${{ steps.tf-output.outputs.db_endpoint }}
        run: |
          SECRET_NAME="retailstore/${ENV}/db-credentials"

          if [ -z "$DB_HOST" ]; then
            echo "⚠️  RDS endpoint not available, skipping secret update"
            exit 0
          fi

          echo "📝 Updating secret with RDS endpoint: $DB_HOST"

          # Get existing secret value
          EXISTING_SECRET=$(aws secretsmanager get-secret-value --secret-id "$SECRET_NAME" --query 'SecretString' --output text)

          # Update with new RDS host
          NEW_SECRET=$(echo "$EXISTING_SECRET" | jq --arg host "$DB_HOST" '.host = $host')

          aws secretsmanager update-secret \
            --secret-id "$SECRET_NAME" \
            --secret-string "$NEW_SECRET"

          echo "✅ Secret updated successfully with RDS endpoint"

  # ─────────────────────────────────────────────
  # 5. SMOKE TESTS
  # ─────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [terraform-apply, detect-environment]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Get ALB URL from Terraform output
        id: tf-output
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT

      - name: Wait for services to be ready
        run: |
          bash tests/wait-for-services.sh "${{ steps.tf-output.outputs.alb_url }}" 120

      - name: Run Smoke Tests
        run: |
          bash tests/smoke-tests.sh "${{ steps.tf-output.outputs.alb_url }}"
