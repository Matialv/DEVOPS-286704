name: Infra Pipeline

on:
  push:
    branches: [main, main-prod, main-test]
    paths:
      - 'infrastructure/**'
  #pull_request:
  #  branches: [main, main-prod, main-test]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  # ─────────────────────────────────────────────
  # 0. DETECTAR ENVIRONMENT POR RAMA
  # ─────────────────────────────────────────────
  detect-environment:
    name: Detect Environment from Branch
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set environment based on branch
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            case "${{ github.ref_name }}" in
              main-prod) ENV="prod" ;;
              main-test) ENV="test" ;;
              main) ENV="dev" ;;
              *) ENV="dev" ;;
            esac
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "🎯 Environment: $ENV (Branch: ${{ github.ref_name }})"
  # ─────────────────────────────────────────────
  # 1. TERRAFORM INIT
  # ─────────────────────────────────────────────
  terraform-init:
    name: Terraform Init - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: detect-environment
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform validate

  # ─────────────────────────────────────────────
  # 2. BOOTSTRAP SECRETS MANAGER (crear secrets si no existen)
  # ─────────────────────────────────────────────
  bootstrap-secrets:
    name: Bootstrap Secrets Manager
    runs-on: ubuntu-latest
    needs: [terraform-init, detect-environment]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Create database credentials secret if not exists
        env:
          ENV: ${{ needs.detect-environment.outputs.environment }}
        run: |
          SECRET_NAME="retailstore/${ENV}/db-credentials"

          # Verificar si el secret existe
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" 2>/dev/null; then
            echo "✅ Secret already exists: $SECRET_NAME"
          else
            echo "📝 Creating secret: $SECRET_NAME"
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "Database credentials for RetailStore ${ENV}" \
              --secret-string '{
                "username": "retailstore",
                "password": "InitialPassword123!",
                "host": "alb-placeholder.elb.us-east-1.amazonaws.com",
                "port": 5432,
                "dbname": "retailstore_'"${ENV}"'"
              }' \
              --region us-east-1
            echo "✅ Secret created successfully"
          fi

  # ─────────────────────────────────────────────
  # 3. TERRAFORM PLAN
  # ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [terraform-init, bootstrap-secrets, detect-environment]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Package Lambda
        run: |
          cd infrastructure/modules/lambda/src
          zip -j ../ecr_scan_notifier.zip ecr_scan_notifier.py

      - name: Terraform Plan
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        env:
          ENV: ${{ needs.detect-environment.outputs.environment }}
        run: |
          terraform plan \
            -var-file="${ENV}.tfvars" \
            -out=tfplan

      - name: Upload Lambda Package
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package-${{ needs.detect-environment.outputs.environment }}
          path: infrastructure/modules/lambda/ecr_scan_notifier.zip
