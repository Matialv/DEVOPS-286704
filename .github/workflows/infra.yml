name: Infra Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  # ─────────────────────────────────────────────
  # 1. TERRAFORM INIT
  # ─────────────────────────────────────────────
  terraform-init:
    name: Terraform Init - ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform validate

  # ─────────────────────────────────────────────
  # 2. TERRAFORM PLAN
  # ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan - ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: terraform-init
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform init

      - name: Import existing resources
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          TF_VARS="-var-file=${ENV}.tfvars -var=sns_email=${{ secrets.SNS_ALERT_EMAIL }}"

          echo "📥 Importando recursos ECR y CloudWatch..."
          for svc in catalog cart checkout orders ui admin; do
            ECR_ADDR="module.ecr.aws_ecr_repository.services[\"${svc}\"]"
            if ! terraform state show "$ECR_ADDR" > /dev/null 2>&1; then
              if aws ecr describe-repositories --repository-names "retailstore-${svc}" > /dev/null 2>&1; then
                echo "  ✓ ECR: retailstore-${svc}"
                terraform import $TF_VARS "$ECR_ADDR" "retailstore-${svc}" 2>/dev/null || true
              fi
            fi

            LG_ADDR="module.ecs.aws_cloudwatch_log_group.services[\"${svc}\"]"
            if ! terraform state show "$LG_ADDR" > /dev/null 2>&1; then
              if aws logs describe-log-groups --log-group-name-prefix "/retailstore/${ENV}/${svc}" \
                  --query "logGroups[?logGroupName=='/retailstore/${ENV}/${svc}'].logGroupName" \
                  --output text | grep -q .; then
                echo "  ✓ Log Group: /retailstore/${ENV}/${svc}"
                terraform import $TF_VARS "$LG_ADDR" "/retailstore/${ENV}/${svc}" 2>/dev/null || true
              fi
            fi
          done

          echo "📥 Importando ALB y Target Groups..."
          ALB_ADDR="module.ecs.aws_lb.main"
          if ! terraform state show "$ALB_ADDR" > /dev/null 2>&1; then
            ALB_ARN=$(aws elbv2 describe-load-balancers --names "retailstore-${ENV}-alb" --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null)
            if [ ! -z "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
              echo "  ✓ ALB: $ALB_ARN"
              terraform import $TF_VARS "$ALB_ADDR" "$ALB_ARN" 2>/dev/null || true
            fi
          fi

          for svc in catalog cart checkout orders ui admin; do
            TG_ADDR="module.ecs.aws_lb_target_group.services[\"${svc}\"]"
            if ! terraform state show "$TG_ADDR" > /dev/null 2>&1; then
              TG_ARN=$(aws elbv2 describe-target-groups --names "rs-${ENV}-${svc}" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null)
              if [ ! -z "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
                echo "  ✓ Target Group: rs-${ENV}-${svc}"
                terraform import $TF_VARS "$TG_ADDR" "$TG_ARN" 2>/dev/null || true
              fi
            fi
          done

          echo "📥 Importando RDS y ElastiCache..."
          RDS_SG_ADDR="module.rds.aws_db_subnet_group.main"
          if ! terraform state show "$RDS_SG_ADDR" > /dev/null 2>&1; then
            RDS_SG=$(aws rds describe-db-subnet-groups --db-subnet-group-name "retailstore-${ENV}-db-subnet" --query 'DBSubnetGroups[0].DBSubnetGroupName' --output text 2>/dev/null)
            if [ ! -z "$RDS_SG" ] && [ "$RDS_SG" != "None" ]; then
              echo "  ✓ RDS Subnet Group: $RDS_SG"
              terraform import $TF_VARS "$RDS_SG_ADDR" "$RDS_SG" 2>/dev/null || true
            fi
          fi

          EC_SG_ADDR="module.elasticache.aws_elasticache_subnet_group.main"
          if ! terraform state show "$EC_SG_ADDR" > /dev/null 2>&1; then
            EC_SG=$(aws elasticache describe-cache-subnet-groups --cache-subnet-group-name "retailstore-${ENV}-redis-subnet" --query 'CacheSubnetGroups[0].CacheSubnetGroupName' --output text 2>/dev/null)
            if [ ! -z "$EC_SG" ] && [ "$EC_SG" != "None" ]; then
              echo "  ✓ ElastiCache Subnet Group: $EC_SG"
              terraform import $TF_VARS "$EC_SG_ADDR" "$EC_SG" 2>/dev/null || true
            fi
          fi

          echo "📥 Importando Secrets Manager..."
          SM_ADDR="module.rds.aws_secretsmanager_secret.db"
          if ! terraform state show "$SM_ADDR" > /dev/null 2>&1; then
            SM_ARN=$(aws secretsmanager describe-secret --secret-id "retailstore/${ENV}/db-credentials" --query 'ARN' --output text 2>/dev/null)
            if [ ! -z "$SM_ARN" ] && [ "$SM_ARN" != "None" ]; then
              echo "  ✓ Secrets Manager: retailstore/${ENV}/db-credentials"
              terraform import $TF_VARS "$SM_ADDR" "$SM_ARN" 2>/dev/null || true
            fi
          fi

          echo "✅ Importación completada"

      - name: Terraform Plan
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform plan \
            -var-file="${ENV}.tfvars" \
            -var="sns_email=${{ secrets.SNS_ALERT_EMAIL }}" \
            -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}/tfplan

  # ─────────────────────────────────────────────
  # 3. TERRAFORM APPLY
  # ─────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply - ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: "${{ github.event.inputs.environment || 'dev' }}"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform init

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}/

      - name: Manual Approval (solo prod)
        if: github.event.inputs.environment == 'prod'
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ vars.PROD_APPROVERS }}
          minimum-approvals: 1

      - name: Terraform Apply
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform apply -auto-approve tfplan

      - name: Get ALB URL from Terraform output
        id: tf-output
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # 4. SMOKE TESTS
  # ─────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests - ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: terraform-apply
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: terraform init

      - name: Get ALB URL from Terraform output
        id: tf-output
        working-directory: infrastructure/environments/${{ github.event.inputs.environment || 'dev' }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT

      - name: Wait for services to be ready
        run: |
          bash tests/wait-for-services.sh "${{ steps.tf-output.outputs.alb_url }}" 120

      - name: Run Smoke Tests
        run: |
          bash tests/smoke-tests.sh "${{ steps.tf-output.outputs.alb_url }}"
