name: Infra Pipeline

on:
  push:
    branches: [main, main-test, main-prod]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  # ─────────────────────────────────────────────
  # 0. DETECTAR ENVIRONMENT POR RAMA
  # ─────────────────────────────────────────────
  detect-environment:
    name: Detect Environment from Branch
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set environment based on branch
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            case "${{ github.ref_name }}" in
              main-prod) ENV="prod" ;;
              main-test) ENV="test" ;;
              main) ENV="dev" ;;
              *) ENV="dev" ;;
            esac
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "🎯 Environment: $ENV (Branch: ${{ github.ref_name }})"
  # ─────────────────────────────────────────────
  # 1. TERRAFORM INIT
  # ─────────────────────────────────────────────
  terraform-init:
    name: Terraform Init - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: detect-environment
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform validate

  # ─────────────────────────────────────────────
  # 2. TERRAFORM PLAN
  # ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [terraform-init, detect-environment]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Package Lambda
        run: |
          cd infrastructure/modules/lambda/src
          zip -j ../ecr_scan_notifier.zip ecr_scan_notifier.py

      - name: Terraform Plan
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        env:
          ENV: ${{ needs.detect-environment.outputs.environment }}
        run: |
          terraform plan \
            -var-file="${ENV}.tfvars" \
            -out=tfplan

      - name: Upload Lambda Package
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package-${{ needs.detect-environment.outputs.environment }}
          path: infrastructure/modules/lambda/ecr_scan_notifier.zip

  # ─────────────────────────────────────────────
  # 3. APROBACIÓN MANUAL (solo prod)
  # ─────────────────────────────────────────────
  approve-prod:
    name: Approve Production Infra
    runs-on: ubuntu-latest
    needs: [terraform-plan, detect-environment]
    if: needs.detect-environment.outputs.environment == 'prod'
    environment: prod
    steps:
      - name: Approval gate (native GitHub environment)
        run: echo "Production infra deployment approved"

  # ─────────────────────────────────────────────
  # 4. TERRAFORM APPLY
  # ─────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: approve-prod
    if: ${{ always() && (needs.approve-prod.result == 'success' || needs.approve-prod.result == 'skipped') }}
    environment: "${{ needs.detect-environment.outputs.environment }}"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Download Lambda Package
        uses: actions/download-artifact@v4
        with:
          name: lambda-package-${{ needs.detect-environment.outputs.environment }}
          path: infrastructure/modules/lambda/

      - name: Terraform Apply
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        env:
          ENV: ${{ needs.detect-environment.outputs.environment }}
        run: |
          terraform apply -auto-approve \
            -var-file="${ENV}.tfvars"

      - name: Get ALB URL from Terraform output
        id: tf-output
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # 5. SMOKE TESTS
  # ─────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: terraform-apply
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Get ALB URL from Terraform output
        id: tf-output
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT

      - name: Wait for services to be ready
        run: |
          bash tests/wait-for-services.sh "${{ steps.tf-output.outputs.alb_url }}" 120

      - name: Run Smoke Tests
        run: |
          bash tests/smoke-tests.sh "${{ steps.tf-output.outputs.alb_url }}"
