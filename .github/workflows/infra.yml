name: Infra Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
  pull_request:
    branches: [main-prod, main-test]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  detect-environment:
    name: Detect Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set environment based on branch or input
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            # Determinar la rama objetivo (target) según el evento
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BRANCH="${{ github.event.pull_request.base.ref }}"
            else
              BRANCH="${{ github.ref_name }}"
            fi

            case "$BRANCH" in
              main-prod) ENV="prod" ;;
              main-test) ENV="test" ;;
              main) ENV="dev" ;;
              *) ENV="dev" ;;
            esac
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT

  terraform-plan:
    name: Terraform Plan - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: detect-environment
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Package Lambda
        run: |
          cd infrastructure/modules/lambda/src
          zip -j ../ecr_scan_notifier.zip ecr_scan_notifier.py

      - name: Bootstrap Secrets Manager
        env:
          ENV: ${{ needs.detect-environment.outputs.environment }}
        run: |
          SECRET_NAME="retailstore/${ENV}/db-credentials"
          if ! aws secretsmanager describe-secret --secret-id "$SECRET_NAME" 2>/dev/null; then
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "Database credentials for RetailStore ${ENV}" \
              --secret-string '{"username": "retailstore","password": "InitialPassword123!","host": "://amazonaws.com","port": 5432,"dbname": "retailstore_'"${ENV}"'"}' \
              --region us-east-1
          fi

      - name: Terraform Init & Validate
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: |
          terraform init
          terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        env:
          ENV: ${{ needs.detect-environment.outputs.environment }}
        run: |
          terraform plan -var-file="${ENV}.tfvars" -out=tfplan

      - name: Upload Terraform Plan File
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.detect-environment.outputs.environment }}
          path: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}/tfplan

      - name: Upload Lambda Package
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package-${{ needs.detect-environment.outputs.environment }}
          path: infrastructure/modules/lambda/ecr_scan_notifier.zip

  approve-prod:
    name: Approve Production Infra
    runs-on: ubuntu-latest
    needs: [terraform-plan, detect-environment]
    if: needs.detect-environment.outputs.environment == 'prod'
    environment: prod
    steps:
      - name: Approval gate
        run: echo "Production infra deployment approved"

  terraform-apply:
    name: Terraform Apply - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [approve-prod, terraform-plan, detect-environment]
    if: |
      always() && 
      (needs.approve-prod.result == 'success' || needs.approve-prod.result == 'skipped') && 
      needs.terraform-plan.result == 'success' &&
      github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Download Lambda Package
        uses: actions/download-artifact@v4
        with:
          name: lambda-package-${{ needs.detect-environment.outputs.environment }}
          path: infrastructure/modules/lambda/
          merge-multiple: true

      - name: Download Terraform Plan File
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.detect-environment.outputs.environment }}
          path: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}/
          merge-multiple: true

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform apply -input=false tfplan

      - name: Get Terraform outputs
        id: tf-output
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          DB_ENDPOINT=$(terraform output -raw db_endpoint 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT
          echo "db_endpoint=$DB_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Update Secrets Manager with RDS endpoint
        env:
          ENV: ${{ needs.detect-environment.outputs.environment }}
          DB_HOST: ${{ steps.tf-output.outputs.db_endpoint }}
        run: |
          SECRET_NAME="retailstore/${ENV}/db-credentials"
          if [ -n "$DB_HOST" ]; then
            EXISTING_SECRET=$(aws secretsmanager get-secret-value --secret-id "$SECRET_NAME" --query 'SecretString' --output text)
            NEW_SECRET=$(echo "$EXISTING_SECRET" | jq --arg host "$DB_HOST" '.host = $host')
            aws secretsmanager update-secret --secret-id "$SECRET_NAME" --secret-string "$NEW_SECRET" --region us-east-1
          fi

  smoke-tests:
    name: Smoke Tests - ${{ needs.detect-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [terraform-apply, detect-environment]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: terraform init

      - name: Get ALB URL from Terraform output
        id: tf-output
        working-directory: infrastructure/environments/${{ needs.detect-environment.outputs.environment }}
        run: |
          ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT

      - name: Wait for services to be ready
        run: bash tests/wait-for-services.sh "${{ steps.tf-output.outputs.alb_url }}" 250

      - name: Run Smoke Tests
        run: bash tests/smoke-tests.sh "${{ steps.tf-output.outputs.alb_url }}"
